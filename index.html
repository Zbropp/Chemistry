<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رؤيه التعليمية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #111; --error: #ff4d4d; --success: #2ecc71; }
        html { overflow-y: auto; scroll-behavior: smooth; }
        body { margin: 0; background: radial-gradient(circle, #1a1a1a, #0a0a0a); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; direction: rtl; padding: 20px; box-sizing: border-box; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 2000; transition: 0.8s; }
        .card { background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.2); text-align: center; width: 320px; box-shadow: 0 20px 50px #000; }
        
        input { width: 85%; padding: 12px; border-radius: 12px; border: 1px solid #222; background: #000; color: var(--gold); text-align: center; margin-top: 20px; outline: none; font-size: 1.1rem; }
        input:focus { border-color: var(--gold); }
        .btn { background: linear-gradient(45deg, #bd952e, #f1c40f); color: #000; border: none; padding: 12px; border-radius: 12px; width: 93%; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }

        #main-content { display: none; width: 100%; max-width: 900px; text-align: center; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .video-box { position: relative; padding-bottom: 56.25%; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); box-shadow: 0 0 40px rgba(212, 175, 55, 0.2); margin-top: 30px; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        /* لوحة الأدمن */
        #admin-section { display: none; margin-top: 60px; background: rgba(20,20,20,0.95); padding: 30px; border-radius: 30px; border: 1px solid var(--gold); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #000; border-radius: 15px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #222; text-align: center; font-size: 0.85rem; }
        th { color: var(--gold); background: #1a1a1a; }
        
        .delete-btn { background: none; border: 1px solid var(--error); color: var(--error); padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; transition: 0.3s; }
        .delete-btn:hover { background: var(--error); color: #fff; }

        .shake { animation: shake 0.4s; border-color: var(--error) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="card" id="card">
            <h2 style="color: var(--gold); margin:0;">منصة رؤيه</h2>
            <p style="color:#555; font-size:0.7rem; letter-spacing:2px;">S E C U R E  S Y S T E M</p>
            <input type="text" id="access-code" placeholder="أدخل كود الدخول">
            <div id="err" style="color:var(--error); display:none; margin-top:15px; font-weight:bold; font-size:0.85rem;"></div>
            <button class="btn" onclick="validateAccess()">دخول المنصة</button>
        </div>
    </div>

    <div id="main-content">
        <h1 style="font-size: 2.5rem; background: linear-gradient(#fff, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">منصة رؤيه التعليمية</h1>
        <div id="timer" style="color:var(--gold); font-weight:bold; font-size:1.2rem; margin-bottom:20px;">⌛ جاري التحميل...</div>
        
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/uyVLSMK2qsk" allowfullscreen></iframe>
        </div>

        <div id="admin-section">
            <h3 style="color: var(--gold);">لوحة تحكم أنس</h3>
            <div style="display:flex; gap:10px; justify-content:center; margin-bottom:20px;">
                <input type="text" id="new-code" style="width:180px; margin:0;" placeholder="كود جديد">
                <button class="btn" style="width:auto; margin:0; padding:10px 20px;" onclick="addNewCode()">تفعيل</button>
            </div>
            <table>
                <thead>
                    <tr><th>الكود</th><th>الوقت</th><th>الجهاز</th><th>إدارة</th></tr>
                </thead>
                <tbody id="logs-body"></tbody>
            </table>
            <button class="btn" style="width:auto; background:#333; color:#fff; margin-top:20px;" onclick="resetSystem()">تصفير شامل</button>
        </div>
        
        <div style="margin-top:50px; opacity:0.2; cursor:pointer;" onclick="openAdmin()">[ لوحة الإدارة ]</div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyBfPImebWX2-6smMWL_CvL3oqliuLK99OY",
            authDomain: "roya-platform.firebaseapp.com",
            databaseURL: "https://roya-platform-default-rtdb.firebaseio.com",
            projectId: "roya-platform",
            storageBucket: "roya-platform.firebasestorage.app",
            messagingSenderId: "295593570374",
            appId: "1:295593570374:web:a54477831d43e9b9475a47",
            measurementId: "G-3S2YRV7PNS"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ADMIN_PASS = "R750";

        function validateAccess() {
            const code = document.getElementById('access-code').value.trim();
            const card = document.getElementById('card');
            const err = document.getElementById('err');
            err.style.display = 'none';
            card.classList.remove('shake');

            if (code === ADMIN_PASS) { unlock(null); return; }

            db.ref('active_codes/' + code).once('value', snapshot => {
                if (snapshot.exists() && snapshot.val() === true) {
                    db.ref('logs/' + code).once('value', logSnap => {
                        if (logSnap.exists()) {
                            showError("⚠️ الكود مستخدم بالفعل!");
                        } else {
                            const info = {
                                time: new Date().toLocaleString('ar-EG'),
                                device: (navigator.userAgent.includes("Mobi") ? "Mobile" : "PC")
                            };
                            db.ref('logs/' + code).set(info);
                            const expiry = new Date().getTime() + (3*60*60*1000);
                            localStorage.setItem('rv_session', expiry);
                            localStorage.setItem('last_code', code);
                            unlock(expiry);
                        }
                    });
                } else { showError("⚠️ الكود غير مفعل!"); }
            });
        }

        function showError(msg) {
            const err = document.getElementById('err');
            err.innerText = msg; err.style.display = 'block';
            document.getElementById('card').classList.add('shake');
        }

        function unlock(expiry) {
            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                if(expiry) startTimer(expiry);
                else document.getElementById('timer').innerText = "وضع الأدمن المفتوح";
                
                // مراقبة الجلسة لايف (للطرد)
                const myCode = localStorage.getItem('last_code');
                if(myCode) {
                    db.ref('logs/' + myCode).on('value', snap => {
                        if(!snap.exists()) { alert("تم إنهاء جلستك!"); localStorage.clear(); location.reload(); }
                    });
                }
            }, 800);
        }

        function startTimer(expiry) {
            setInterval(() => {
                const diff = expiry - new Date().getTime();
                if(diff <= 0) { localStorage.clear(); location.reload(); }
                const h = Math.floor(diff/3600000);
                const m = Math.floor((diff%3600000)/60000);
                const s = Math.floor((diff%60000)/1000);
                document.getElementById('timer').innerText = `⏳ متبقي: ${h}:${m}:${s}`;
            }, 1000);
        }

        function openAdmin() {
            if(prompt("كلمة سر الإدارة:") === ADMIN_PASS) {
                document.getElementById('admin-section').style.display = 'block';
                loadLogs();
            }
        }

        function addNewCode() {
            const code = document.getElementById('new-code').value.trim();
            if(code) db.ref('active_codes/' + code).set(true).then(() => {
                alert("تم تفعيل الكود: " + code); document.getElementById('new-code').value = "";
            });
        }

        function loadLogs() {
            db.ref('logs').on('value', snap => {
                const body = document.getElementById('logs-body');
                body.innerHTML = "";
                snap.forEach(child => {
                    const d = child.val();
                    body.innerHTML += `<tr><td>${child.key}</td><td>${d.time}</td><td>${d.device}</td>
                    <td><button class="delete-btn" onclick="terminateSession('${child.key}')">حذف</button></td></tr>`;
                });
            });
        }

        function terminateSession(code) {
            if(confirm("طرد هذا المستخدم؟")) {
                db.ref('logs/' + code).remove();
                db.ref('active_codes/' + code).set(false);
            }
        }

        function resetSystem() {
            if(confirm("تصفير شامل؟")) { db.ref('/').remove(); localStorage.clear(); location.reload(); }
        }

        window.onload = () => {
            const session = localStorage.getItem('rv_session');
            if(session && new Date().getTime() < session) unlock(session);
        };
    </script>
</body>
</html>
