<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رؤيه التعليمية - الإدارة</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #111; --error: #e74c3c; --success: #2ecc71; }
        body { margin: 0; background: radial-gradient(circle, #1a1a1a, #0a0a0a); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; direction: rtl; padding: 20px; box-sizing: border-box; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 2000; transition: 0.8s; }
        .card { background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.2); text-align: center; width: 320px; box-shadow: 0 20px 50px #000; }
        
        input { width: 85%; padding: 12px; border-radius: 12px; border: 1px solid #222; background: #000; color: var(--gold); text-align: center; margin-top: 20px; outline: none; font-size: 1.1rem; }
        .btn { background: linear-gradient(45deg, #bd952e, #f1c40f); color: #000; border: none; padding: 12px; border-radius: 12px; width: 95%; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }

        #main-content { display: none; width: 100%; max-width: 1000px; text-align: center; }
        .video-box { position: relative; padding-bottom: 56.25%; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); margin-top: 20px; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* لوحة تحكم الإدارة */
        #admin-section { display: none; margin-top: 50px; background: rgba(15,15,15,0.95); padding: 30px; border-radius: 30px; border: 1px solid var(--gold); }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .admin-grid { grid-template-columns: 1fr; } }

        .panel { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { padding: 12px; border-bottom: 1px solid #222; text-align: center; }
        th { color: var(--gold); }
        
        .del-btn { background: none; border: 1px solid var(--error); color: var(--error); padding: 4px 8px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .del-btn:hover { background: var(--error); color: #fff; }

        .shake { animation: shake 0.4s; border-color: var(--error) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="card" id="card">
            <h2 style="color: var(--gold);">منصة رؤيه</h2>
            <input type="text" id="access-code" placeholder="أدخل كود الدخول">
            <div id="err" style="color:var(--error); display:none; margin-top:15px; font-size:0.8rem;"></div>
            <button class="btn" onclick="validateAccess()">دخول</button>
        </div>
    </div>

    <div id="main-content">
        <h1 style="background: linear-gradient(#fff, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">منصة رؤيه التعليمية</h1>
        <div id="timer" style="color:var(--gold); font-weight:bold; margin-bottom:10px;">⌛ جاري المزامنة...</div>
        
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/uyVLSMK2qsk" allowfullscreen></iframe>
        </div>

        <div id="admin-section">
            <h2 style="color: var(--gold);">لوحة تحكم الإدارة</h2>
            
            <div style="margin-bottom: 20px;">
                <input type="text" id="new-code" style="width:200px;" placeholder="إنشاء كود جديد">
                <button class="btn" style="width:auto; padding:10px 30px;" onclick="addNewCode()">تفعيل وحفظ</button>
            </div>

            <div class="admin-grid">
                <div class="panel">
                    <h4 style="color:var(--success)">الأكواد المفعّلة حالياً</h4>
                    <table id="codes-table">
                        <thead><tr><th>الكود</th><th>الإجراء</th></tr></thead>
                        <tbody id="codes-body"></tbody>
                    </table>
                </div>

                <div class="panel">
                    <h4 style="color:var(--gold)">الجلسات النشطة (لايف)</h4>
                    <table>
                        <thead><tr><th>الكود المستخدم</th><th>الجهاز</th><th>طرد</th></tr></thead>
                        <tbody id="logs-body"></tbody>
                    </table>
                </div>
            </div>
            
            <button class="btn" style="width:auto; background:#222; color:#777; margin-top:30px;" onclick="resetSystem()">تصفير شامل</button>
        </div>
        
        <div style="margin-top:50px; opacity:0.2; cursor:pointer;" onclick="openAdmin()">[ لوحة الإدارة ]</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBfPImebWX2-6smMWL_CvL3oqliuLK99OY",
            authDomain: "roya-platform.firebaseapp.com",
            databaseURL: "https://roya-platform-default-rtdb.firebaseio.com",
            projectId: "roya-platform",
            storageBucket: "roya-platform.firebasestorage.app",
            messagingSenderId: "295593570374",
            appId: "1:295593570374:web:a54477831d43e9b9475a47"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ADMIN_PASS = "R750";

        function validateAccess() {
            const code = document.getElementById('access-code').value.trim();
            const card = document.getElementById('card');
            const err = document.getElementById('err');
            err.style.display = 'none';

            if (code === ADMIN_PASS) { unlock(null); return; }

            db.ref('active_codes/' + code).once('value', snapshot => {
                if (snapshot.exists() && snapshot.val() === true) {
                    db.ref('logs/' + code).once('value', logSnap => {
                        if (logSnap.exists()) {
                            showError("⚠️ الكود مستخدم بالفعل!");
                        } else {
                            const info = { device: (navigator.userAgent.includes("Mobi") ? "Mobile" : "PC"), time: new Date().toLocaleTimeString('ar-EG') };
                            db.ref('logs/' + code).set(info);
                            const expiry = new Date().getTime() + (3*60*60*1000);
                            localStorage.setItem('rv_session', expiry);
                            localStorage.setItem('my_code', code);
                            unlock(expiry);
                        }
                    });
                } else { showError("⚠️ كود خاطئ أو غير مفعل!"); }
            });
        }

        function showError(msg) {
            const err = document.getElementById('err');
            err.innerText = msg; err.style.display = 'block';
            document.getElementById('card').classList.add('shake');
            setTimeout(() => document.getElementById('card').classList.remove('shake'), 400);
        }

        function unlock(expiry) {
            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                if(expiry) startTimer(expiry);
                else document.getElementById('timer').innerText = "وضع الإدارة";
                
                const myCode = localStorage.getItem('my_code');
                if(myCode) {
                    db.ref('logs/' + myCode).on('value', snap => {
                        if(!snap.exists()) { alert("انتهت جلستك!"); location.reload(); }
                    });
                }
            }, 800);
        }

        function startTimer(expiry) {
            setInterval(() => {
                const diff = expiry - new Date().getTime();
                if(diff <= 0) { localStorage.clear(); location.reload(); }
                const m = Math.floor((diff%3600000)/60000);
                const s = Math.floor((diff%60000)/1000);
                document.getElementById('timer').innerText = `⏳ متبقي: ${m}:${s}`;
            }, 1000);
        }

        function openAdmin() {
            if(prompt("باسورد الإدارة:") === ADMIN_PASS) {
                document.getElementById('admin-section').style.display = 'block';
                loadAdminData();
            }
        }

        function addNewCode() {
            const code = document.getElementById('new-code').value.trim();
            if(code) db.ref('active_codes/' + code).set(true).then(() => {
                document.getElementById('new-code').value = "";
            });
        }

        function loadAdminData() {
            // تحميل الأكواد المتاحة
            db.ref('active_codes').on('value', snap => {
                const body = document.getElementById('codes-body');
                body.innerHTML = "";
                snap.forEach(child => {
                    if(child.val() === true) {
                        body.innerHTML += `<tr><td>${child.key}</td>
                        <td><button class="del-btn" onclick="deleteCode('${child.key}')">إلغاء وتفعيل</button></td></tr>`;
                    }
                });
            });

            // تحميل الجلسات النشطة
            db.ref('logs').on('value', snap => {
                const body = document.getElementById('logs-body');
                body.innerHTML = "";
                snap.forEach(child => {
                    body.innerHTML += `<tr><td style="color:var(--gold)">${child.key}</td>
                    <td>${child.val().device}</td>
                    <td><button class="del-btn" onclick="terminate('${child.key}')">طرد</button></td></tr>`;
                });
            });
        }

        function deleteCode(code) {
            if(confirm("حذف الكود؟ سيتم طرد أي شخص يستخدمه حالياً.")) {
                db.ref('active_codes/' + code).remove();
                db.ref('logs/' + code).remove();
            }
        }

        function terminate(code) {
            if(confirm("طرد المستخدم؟")) {
                db.ref('logs/' + code).remove();
                db.ref('active_codes/' + code).set(false);
            }
        }

        function resetSystem() {
            if(confirm("تصفير شامل؟")) db.ref('/').remove();
        }

        window.onload = () => {
            const session = localStorage.getItem('rv_session');
            if(session && new Date().getTime() < session) unlock(session);
        };
    </script>
</body>
</html>
