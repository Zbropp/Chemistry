<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رؤيه التعليمية</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --gold-main: #d4af37;
            --gold-glow: #f1c40f;
            --text-gray: #aaaaaa;
            --error-red: #ff4d4d;
            --success-green: #2ecc71;
        }

        html { overflow-y: auto; scroll-behavior: smooth; }

        body {
            margin: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
            padding: 40px 0;
            box-sizing: border-box;
        }

        /* واجهة الدخول */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.8s ease;
        }

        .login-card {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 40px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
            width: 350px;
            box-shadow: 20px 20px 60px #050505, -5px -5px 20px rgba(212, 175, 55, 0.05);
            transition: 0.4s;
            position: relative;
        }

        /* أنيميشن الاهتزاز والنجاح */
        .shake { animation: shake 0.4s ease-in-out; border-color: var(--error-red) !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .pulse-success { animation: pulse 1.5s infinite; border-color: var(--gold-main) !important; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        .login-card h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, var(--gold-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input {
            width: 85%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: #0d0d0d;
            box-shadow: inset 5px 5px 10px #050505, inset -1px -1px 5px rgba(255,255,255,0.02);
            color: var(--gold-glow);
            text-align: center;
            font-size: 1.1rem;
            margin-top: 25px;
            outline: none;
        }

        .gold-btn {
            background: linear-gradient(145deg, #bd952e, #eec751);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 15px;
            width: 93%;
            font-weight: 800;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 5px 5px 15px #050505;
            transition: 0.3s;
        }

        .gold-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* لوحة تحكم الأدمن */
        #admin-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        #success-screen { display: none; }

        /* المحتوى الرئيسي */
        #main-content {
            display: none;
            width: 90%;
            max-width: 900px;
            text-align: center;
            margin: auto;
        }

        .title-main {
            font-size: 2.8rem;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #fff, var(--gold-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timer-badge {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 10px 25px;
            border-radius: 50px;
            color: var(--gold-glow);
            font-weight: bold;
            display: inline-block;
            margin-bottom: 35px;
        }

        .video-frame {
            background: #111;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .video-inner {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 20px;
            overflow: hidden;
        }

        .video-inner iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .admin-trigger {
            margin-top: 60px;
            padding-bottom: 20px;
            color: var(--gold-main);
            opacity: 0.85;
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .admin-trigger:hover { opacity: 1; text-decoration: underline; }

    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card" id="login-card">
            <h2>منصة رؤيه</h2>
            <p style="color: #666; font-size: 0.8rem; letter-spacing: 2px;">SECURE ACCESS SYSTEM</p>
            <input type="text" id="access-code" placeholder="أدخل كود الدخول">
            <div id="login-error" style="color:var(--error-red); display:none; margin-top:15px; font-weight:bold; font-size:0.85rem;">⚠️ الكود غير صحيح أو منتهي</div>
            <button class="gold-btn" onclick="validateAccess()">دخول المنصة</button>
        </div>
    </div>

    <div id="admin-modal">
        <div class="login-card" id="admin-card">
            <div id="admin-input-screen">
                <h3 style="color: var(--bright-gold); margin:0;">لوحة التحكم</h3>
                <p style="color: #666; font-size: 0.8rem;">إدارة الأكواد المتقدمة</p>
                <input type="password" id="admin-input" placeholder="كلمة سر الإدارة">
                <div id="admin-error" style="color:var(--error-red); display:none; margin-top:15px; font-weight:bold; font-size:0.85rem;">⚠️ كلمة السر خاطئة</div>
                <button class="gold-btn" onclick="executeReset()">تصفير النظام</button>
                <button style="background:none; border:none; color:#555; cursor:pointer; margin-top:15px;" onclick="closeAdmin()">إغلاق</button>
            </div>

            <div id="success-screen">
                <div style="font-size: 4rem; color: var(--gold-main); margin-bottom: 20px;">✓</div>
                <h3 style="color: #fff; margin: 0;">تم بنجاح</h3>
                <p style="color: var(--gold-glow); font-size: 0.9rem; margin-top: 10px;">تم تصفير جميع البيانات والأكواد</p>
                <div style="color: #444; font-size: 0.7rem; margin-top: 20px;">جاري إعادة التشغيل...</div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <h1 class="title-main">منصة رؤيه التعليمية</h1>
        <div class="timer-badge" id="timer-box">⏳ جاري التحقق...</div>
        
        <div class="video-frame">
            <div class="video-inner">
                <iframe src="https://www.youtube.com/embed/uyVLSMK2qsk" allowfullscreen></iframe>
            </div>
        </div>

        <div class="admin-trigger" onclick="openAdmin()">CONTROL PANEL ACCESS</div>
    </div>

    <script>
        const ADMIN_PASS = "R750"; 
        const SESSION_DURATION = 3 * 60 * 60 * 1000; 

        const secretCodes = ["AX92-K18J", "BN41-P09L", "CR73-M55V", "DT12-Q88X", "EY44-W21Z", "FZ88-S33B", "GH56-N66C", "JK29-D44F", "LM07-R11G", "NP31-H99K", "QR62-T77S", "ST45-V22M", "VW18-L33P", "XY90-J55Q", "ZA14-G11W", "BC33-F66N", "DE55-K88R", "FG77-S22D", "HI99-X44T", "JK11-V00P", "LM22-B11M", "NO44-Q77L", "PQ66-W99Z", "RS88-J33S", "TU00-K55G", "WX13-M66H", "YZ25-P44V", "AB37-N22X", "CD49-R88K", "EF61-L00Q", "GH73-T55Z", "IJ85-G11F", "KL97-S66D", "MN09-W44P", "OP21-B99L", "QR33-K77M", "ST45-V22H", "UV57-N88R", "WX69-J11T", "YZ81-P55G", "A1B2-C3D4", "E5F6-G7H8", "I9J0-K1L2", "M3N4-O5P6", "Q7R8-S9T0", "U1V2-W3X4", "Y5Z6-A7B8", "C9D0-E1F2", "G3H4-I5J6", "K7L8-M9N0", "O1P2-Q3R4", "S5T6-U7V8", "W9X0-Y1Z2", "A3B5-C7D9", "E1F4-G8H2", "I6J2-K0L1", "M5N7-O2P8", "Q4R1-S6T9", "U8V3-W5X2", "Y1Z0-A9B4"];

        function init() {
            if (!localStorage.getItem('rv_v5_codes')) {
                localStorage.setItem('rv_v5_codes', JSON.stringify(secretCodes));
                localStorage.setItem('rv_v5_used', JSON.stringify([]));
            }
            const expiry = localStorage.getItem('rv_v5_expiry');
            if (expiry && new Date().getTime() < expiry) showPlatform(expiry);
        }

        function validateAccess() {
            const code = document.getElementById('access-code').value.trim();
            const card = document.getElementById('login-card');
            const error = document.getElementById('login-error');
            error.style.display = 'none';
            card.classList.remove('shake');

            if (code === ADMIN_PASS) {
                showPlatform(null);
                return;
            }

            let available = JSON.parse(localStorage.getItem('rv_v5_codes'));
            if (available.includes(code)) {
                available.splice(available.indexOf(code), 1);
                let used = JSON.parse(localStorage.getItem('rv_v5_used'));
                used.push(code);
                localStorage.setItem('rv_v5_codes', JSON.stringify(available));
                localStorage.setItem('rv_v5_used', JSON.stringify(used));
                const expiry = new Date().getTime() + SESSION_DURATION;
                localStorage.setItem('rv_v5_expiry', expiry);
                showPlatform(expiry);
            } else {
                setTimeout(() => card.classList.add('shake'), 10);
                error.style.display = 'block';
            }
        }

        function showPlatform(expiry) {
            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.body.style.overflowY = 'auto';
                if (expiry) startTimer(expiry);
                else document.getElementById('timer-box').innerText = "ADMIN ACCESS UNLOCKED";
            }, 800);
        }

        function startTimer(expiry) {
            setInterval(() => {
                const diff = expiry - new Date().getTime();
                if (diff <= 0) { localStorage.removeItem('rv_v5_expiry'); location.reload(); }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-box').innerText = `⏳ متبقي لك: ${h}:${m}:${s}`;
            }, 1000);
        }

        function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
        
        function closeAdmin() { 
            document.getElementById('admin-modal').style.display = 'none'; 
            document.getElementById('admin-card').classList.remove('shake');
            document.getElementById('admin-error').style.display = 'none';
        }
        
        function executeReset() {
            const pass = document.getElementById('admin-input').value;
            const card = document.getElementById('admin-card');
            const error = document.getElementById('admin-error');
            const inputScreen = document.getElementById('admin-input-screen');
            const successScreen = document.getElementById('success-screen');

            error.style.display = 'none';
            card.classList.remove('shake');

            if (pass === ADMIN_PASS) {
                // تفعيل واجهة النجاح الفخمة
                inputScreen.style.display = 'none';
                successScreen.style.display = 'block';
                card.classList.add('pulse-success');
                
                // مسح البيانات وإعادة التشغيل بعد ثانيتين
                localStorage.clear();
                setTimeout(() => {
                    location.reload();
                }, 2500);
            } else {
                setTimeout(() => card.classList.add('shake'), 10);
                error.style.display = 'block';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
