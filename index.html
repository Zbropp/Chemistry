<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رؤيه | الإصدار الملكي النهائي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #d4af37; --accent-glow: #f1c40f; --bg: #050505; --glass: rgba(18, 18, 18, 0.9); --error: #ff4d4d; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg); display: flex; justify-content: center; align-items: center; overflow: hidden; }

        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background-color: #050505; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; justify-content: center; align-items: center; background: transparent; }
        .login-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.25); border-radius: 40px; padding: 45px 35px; text-align: center; width: 360px; max-width: 90%; box-shadow: 0 30px 80px rgba(0,0,0,0.9); animation: fadeInScale 0.7s cubic-bezier(0.19, 1, 0.22, 1); }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.96) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .logo-text { font-size: 2.4rem; font-weight: 800; background: linear-gradient(135deg, #fff 20%, var(--accent) 50%, #b8860b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        input { width: 100%; padding: 16px; background: rgba(0,0,0,0.6); border: 1px solid #252525; border-radius: 18px; color: var(--accent-glow); text-align: center; font-size: 1.05rem; margin-top: 30px; outline: none; }
        .btn-gold { background: linear-gradient(145deg, #bd952e, #f1c40f); color: #000; border: none; padding: 15px; border-radius: 18px; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 20px; width: 100%; transition: 0.3s; }

        #main-content { display: none; width: 90%; max-width: 1000px; text-align: center; z-index: 50; position: relative; height: 100vh; overflow-y: auto; padding: 40px 0; }
        .video-box { position: relative; padding-bottom: 56.25%; border-radius: 35px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.2); margin-top: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        .video-box iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:none; }

        .admin-trigger { margin-top: 40px; padding: 12px 25px; color: var(--accent); cursor: pointer; border: 1px solid rgba(212, 175, 55, 0.3); display: inline-block; border-radius: 12px; background: rgba(10, 10, 10, 0.5); }
        
        #admin-panel-ui { display: none; background: rgba(10, 10, 10, 0.98); border: 1px solid var(--accent); border-radius: 30px; padding: 25px; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; color: #fff; font-size: 0.8rem; }
        th { color: var(--accent); border-bottom: 1px solid #333; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #111; }

        .custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-card { background: #0d0d0d; border: 1px solid var(--accent); padding: 35px; border-radius: 30px; width: 330px; text-align: center; }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div id="login-overlay">
        <div class="login-card" id="login-card">
            <h1 class="logo-text">منصة رؤيه</h1>
            <input type="text" id="access-code" placeholder="أدخل كود العبور">
            <button class="btn-gold" onclick="validateAccess()">استكشاف المنصة</button>
        </div>
    </div>

    <div id="main-content">
        <h1 class="logo-text" style="font-size: 2.2rem;">منصة رؤيه التعليمية</h1>
        <div class="video-box"><iframe src="https://www.youtube.com/embed/uyVLSMK2qsk" allowfullscreen></iframe></div>

        <div id="admin-panel-ui">
            <h3 style="color:var(--accent);">لوحة إدارة المشرف</h3>
            <div style="display:flex; gap:10px; justify-content:center; margin:20px 0;">
                <input type="text" id="new-code" placeholder="كود جديد" style="margin:0; width:180px; padding:10px;">
                <button class="btn-gold" style="width:auto; margin:0; padding:0 20px;" onclick="addNewCode()">تفعيل</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div style="background:#000; padding:15px; border-radius:15px; border:1px solid #222;">
                    <h5 style="color:var(--accent); margin:0;">الأكواد المتاحة</h5>
                    <table id="codes-table"><tbody></tbody></table>
                </div>
                <div style="background:#000; padding:15px; border-radius:15px; border:1px solid #222;">
                    <h5 style="color:var(--accent); margin:0;">الجلسات النشطة</h5>
                    <table id="logs-table"><tbody></tbody></table>
                </div>
            </div>
        </div>

        <div class="admin-trigger" id="admin-btn" onclick="showModal('admin-auth-modal')">فتح لوحة الإدارة</div>
    </div>

    <div id="admin-auth-modal" class="custom-modal">
        <div class="modal-card">
            <h3 style="color: var(--accent); margin:0;">تحقق المشرف</h3>
            <input type="password" id="admin-pass-input" placeholder="••••">
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button class="btn-gold" style="margin:0; flex:1;" onclick="checkAdmin()">دخول</button>
                <button class="btn-gold" style="margin:0; flex:1; background:#1a1a1a; color:#fff;" onclick="closeModal('admin-auth-modal')">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", { "particles": { "number": { "value": 90 }, "color": { "value": "#d4af37" }, "shape": { "type": "polygon", "polygon": { "nb_sides": 5 } }, "opacity": { "value": 0.4 }, "size": { "value": 3 }, "line_linked": { "enable": true, "distance": 150, "color": "#d4af37", "opacity": 0.2 }, "move": { "enable": true, "speed": 1.5 } } });

        const firebaseConfig = { apiKey: "AIzaSyBfPImebWX2-6smMWL_CvL3oqliuLK99OY", authDomain: "roya-platform.firebaseapp.com", databaseURL: "https://roya-platform-default-rtdb.firebaseio.com", projectId: "roya-platform", storageBucket: "roya-platform.firebasestorage.app", messagingSenderId: "295593570374", appId: "1:295593570374:web:a54477831d43e9b9475a47" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ADMIN_PASS = "R750";

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function validateAccess() {
            const code = document.getElementById('access-code').value.trim();
            if (code === ADMIN_PASS) { unlock(); return; }
            db.ref('active_codes/' + code).once('value', snap => {
                if (snap.exists() && snap.val() === true) {
                    localStorage.setItem('rv_session', new Date().getTime() + (3*60*60*1000));
                    unlock();
                } else { document.getElementById('login-card').classList.add('shake'); setTimeout(() => document.getElementById('login-card').classList.remove('shake'), 400); }
            });
        }

        function unlock() { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('main-content').style.display = 'block'; document.body.style.overflow = 'auto'; }

        function checkAdmin() {
            if (document.getElementById('admin-pass-input').value === ADMIN_PASS) {
                closeModal('admin-auth-modal');
                document.getElementById('admin-panel-ui').style.display = 'block';
                document.getElementById('admin-btn').style.display = 'none';
                loadAdminData();
            }
        }

        function addNewCode() {
            const code = document.getElementById('new-code').value.trim();
            if(code) db.ref('active_codes/' + code).set(true).then(() => document.getElementById('new-code').value = "");
        }

        function loadAdminData() {
            db.ref('active_codes').on('value', snap => {
                const b = document.querySelector('#codes-table tbody'); b.innerHTML = "";
                snap.forEach(c => { if(c.val() === true) b.innerHTML += `<tr><td>${c.key}</td><td><button onclick="terminate('${c.key}')" style="color:red; background:none; border:none; cursor:pointer;">حذف</button></td></tr>`; });
            });
            db.ref('logs').on('value', snap => {
                const b = document.querySelector('#logs-table tbody'); b.innerHTML = "";
                snap.forEach(c => { b.innerHTML += `<tr><td>${c.key}</td><td><button onclick="terminate('${c.key}')" style="color:red; background:none; border:none; cursor:pointer;">طرد</button></td></tr>`; });
            });
        }

        function terminate(code) { db.ref('logs/' + code).remove(); db.ref('active_codes/' + code).remove(); }

        window.onload = () => { if (localStorage.getItem('rv_session') > new Date().getTime()) unlock(); };
    </script>
</body>
</html>
